name: Tests

on:
  push:
    branches: [main, filament/v3]
  pull_request:
    branches: [main, filament/v3]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '10.*'
            filament: '3.*'
            testbench: '8.*'
          - php: '8.2'
            laravel: '11.*'
            filament: '3.*'
            testbench: '9.*'
          - php: '8.3'
            laravel: '12.*'
            filament: '3.*'
            testbench: '10.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "filament/filament:${{ matrix.filament }}" "orchestra/testbench:${{ matrix.testbench }}" --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit --fail-on-skipped --fail-on-incomplete

  v3-release-gate:
    if: github.event_name == 'pull_request' && github.base_ref == 'filament/v3'
    needs: tests
    runs-on: ubuntu-latest
    name: v0.1.x Release Gate

    steps:
      - name: Require green v0.1.x compatibility matrix
        run: |
          echo "Gate is informational; enforcement comes from needs: tests and branch protection."
          echo "All v0.1.x compatibility matrix jobs passed."
          echo "Backport PR is releasable from filament/v3."
